name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Z-ai verifiers + ID-graph integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Z-ai standards verifier (TOOL-VERIFY-002)
        run: node standards/scripts/verify-standards.js
        continue-on-error: true

      - name: Run Z-ai ID-graph verifier (TOOL-VERIFY-004)
        run: node standards/scripts/verify-id-graph.js
        continue-on-error: true

      - name: Run skills verifier (TOOL-VERIFY-002b)
        run: node standards/scripts/verify-skills.js --strict
        continue-on-error: true

      - name: Run guard-side docs verifier (TOOL-VERIFY-001)
        run: bash guard/tools/verify-docs.sh --skip-platform
        continue-on-error: true

      - name: Report verification status
        run: |
          echo "=== Verification summary ==="
          echo "Note: All verifiers above are SOFT in CI for now (continue-on-error: true)."
          echo "They will be promoted to HARD once Z.ai-Dense-graph stabilizes."
          echo "Local pre-commit hook enforces HARD blocks on the same checks."

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true

      - name: Build Next.js
        run: npm run build
        continue-on-error: true
        env:
          DATABASE_URL: "file:./ci-test.db"

      - name: Report build status
        run: |
          echo "=== Build summary ==="
          echo "Note: tsc and build are SOFT in CI (continue-on-error: true) until"
          echo "pre-existing TypeScript errors in docs/templates/ are cleaned up."
          echo "Phase F (post-MVP) will promote these to HARD blockers."
